<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | PapirVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../Styles/fonts.css">
    <link rel="stylesheet" href="../Styles/themes.css">
    <link rel="stylesheet" href="../Styles/style.css">
</head>
<body class="modern-bg">

    <div class="container-fluid min-vh-100 d-flex flex-column">
        <nav class="py-4 px-4">
            <a href="ClientLogin.html" class="back-link text-decoration-none text-secondary fw-bold" id="resetBackLink">
                <i class="bi bi-arrow-left-circle-fill me-2"></i>Back to Login
            </a>
        </nav>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="login-web-card animate-up" style="max-width: 720px;">
                <div class="row g-0">
                    <div class="col-lg-5 d-none d-lg-flex flex-column justify-content-center p-5 branding-section text-white">
                        <div class="mb-4">
                            <img src="../Assets/logo.png" alt="Logo" class="login-brand-img">
                        </div>
                        <h1 class="fw-bold mb-3">Set New <br>Password.</h1>
                        <p class="opacity-75">Create a new secure password for your PapirVault account.</p>
                    </div>

                    <div class="col-lg-7 p-4 p-md-5 bg-white">
                        <div class="text-center text-lg-start mb-4">
                            <div class="icon-circle-lg bg-light text-primary-blue mb-3 d-lg-none mx-auto">
                                <i class="bi bi-shield-lock-fill"></i>
                            </div>
                            <h2 class="fw-bold text-dark">Reset Password</h2>
                            <p class="text-muted mb-1">Enter your new password below.</p>
                            <p class="extra-small text-muted mb-0" id="resetEmailHint"></p>
                        </div>

                        <div id="resetStatus" class="alert d-none rounded-3 py-2 px-3 mb-3" role="alert"></div>

                        <form id="passwordResetForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase tracking-wider">New Password</label>
                                <div class="modern-input-group">
                                    <i class="bi bi-lock-fill"></i>
                                    <input type="password" id="newPassword" class="form-control shadow-none" placeholder="At least 6 characters" minlength="6" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-uppercase tracking-wider">Confirm New Password</label>
                                <div class="modern-input-group">
                                    <i class="bi bi-lock-fill"></i>
                                    <input type="password" id="confirmPassword" class="form-control shadow-none" placeholder="Repeat your password" minlength="6" required>
                                </div>
                            </div>

                            <button type="submit" id="resetSubmitBtn" class="btn btn-primary-blue w-100 py-3 fw-bold rounded-3 mb-3">
                                Set New Password
                            </button>
                        </form>

                        <div id="resetError" class="alert alert-danger d-none rounded-3 border-0 py-2 px-3" role="alert"></div>
                        <div id="resetSuccess" class="alert alert-success d-none rounded-3 border-0 py-2 px-3" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../Main/script.js"></script>
    <script src="../Main/firebase-env.js"></script>
    <script type="module">
        import "../Main/firebase-auth.js";

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const role = (params.get("role") || "client").toLowerCase();

            const backLink = document.getElementById("resetBackLink");
            if (backLink && role === "issuer") {
                backLink.href = "IssuerLogin.html";
                backLink.innerHTML = '<i class="bi bi-arrow-left-circle-fill me-2"></i>Back to Issuer Login';
            }

            window.PapirVaultAuth?.initPasswordResetPage({
                formSelector: "#passwordResetForm",
                passwordSelector: "#newPassword",
                confirmSelector: "#confirmPassword",
                submitButtonSelector: "#resetSubmitBtn",
                errorSelector: "#resetError",
                successSelector: "#resetSuccess",
                statusSelector: "#resetStatus",
                emailHintSelector: "#resetEmailHint",
                clientLoginHref: "ClientLogin.html",
                issuerLoginHref: "IssuerLogin.html"
            });
        });
    </script>
</body>
</html>
