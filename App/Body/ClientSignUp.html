<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Vault | PapirVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../Styles/fonts.css">
    <link rel="stylesheet" href="../Styles/themes.css">
    <link rel="stylesheet" href="../Styles/style.css">
</head>
<body class="modern-bg">

    <div class="container-fluid min-vh-100 d-flex flex-column">
        <nav class="py-4 px-4">
            <a href="ClientLogin.html" class="back-link text-decoration-none text-secondary fw-bold">
                <i class="bi bi-arrow-left-circle-fill me-2"></i>Back to Login
            </a>
        </nav>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="signup-web-card animate-up">
                <div class="row g-0">
                    <div class="col-lg-5 d-none d-lg-flex flex-column justify-content-center p-5 branding-section text-white">
                        <div class="mb-4">
                            <img src="../Assets/logo.png" alt="Logo" class="login-brand-img">
                        </div>
                        <h1 class="fw-bold mb-3">Begin Your <br>Secure Journey.</h1>
                        <ul class="list-unstyled opacity-75 mt-4">
                            <li class="mb-3"><i class="bi bi-check-circle-fill me-2"></i> 180-day secure document storage</li>
                            <li class="mb-3"><i class="bi bi-check-circle-fill me-2"></i> Instant issuer verification</li>
                            <li class="mb-3"><i class="bi bi-check-circle-fill me-2"></i> Bank-level data encryption</li>
                        </ul>
                    </div>

                    <div class="col-lg-7 p-4 p-md-5 bg-white">
                        <div class="form-header mb-4">
                            <h2 class="fw-bold text-dark">Start Your Vault</h2>
                            <p class="text-muted">Create your account to start managing documents.</p>
                        </div>

                        <form id="clientSignUpForm" data-firebase-auth="true">
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase tracking-wider">First Name</label>
                                    <input type="text" class="form-control-custom" placeholder="John" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase tracking-wider">Last Name</label>
                                    <input type="text" class="form-control-custom" placeholder="Doe" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase tracking-wider">Email Address</label>
                                <div class="modern-input-group">
                                    <i class="bi bi-envelope"></i>
                                    <input type="email" id="signupEmail" class="form-control shadow-none" placeholder="name@email.com" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase tracking-wider">Create Password</label>
                                <div class="modern-input-group">
                                    <i class="bi bi-key"></i>
                                    <input type="password" id="signupPassword" class="form-control shadow-none" placeholder="••••••••" required>
                                    <button type="button" class="eye-toggle" id="signupEyeToggle">
                                        <i class="bi bi-eye" id="signupEyeIcon"></i>
                                    </button>
                                </div>
                                <div class="progress mt-2" style="height: 6px; border-radius: 10px;">
                                    <div id="strengthBar" class="progress-bar bg-danger" style="width: 33%"></div>
                                </div>
                                <div class="d-flex justify-content-between mt-1">
                                    <small id="strengthText" class="text-muted extra-small">Strength: Weak</small>
                                </div>
                            </div>

                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                <label class="form-check-label small text-muted" for="termsCheck">
                                    I agree to the <span class="text-primary-blue fw-bold">180-day storage policy</span> and privacy terms.
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary-blue w-100 py-3 fw-bold rounded-3 mb-3">
                                Create Free Vault
                            </button>
                            <div id="signupAuthError" class="small text-danger mt-2 d-none"></div>
                            <div id="signupAuthSuccess" class="small text-success mt-2 d-none"></div>
                        </form>

                        <div class="text-center">
                            <p class="small text-muted mb-0">Already have a vault? <a href="ClientLogin.html" class="text-primary-blue fw-bold text-decoration-none">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../Main/script.js"></script>
    <script src="../Main/firebase-env.js"></script>
    <script type="module">
        import "../Main/firebase-auth.js";

        document.addEventListener("DOMContentLoaded", () => {
            if (window.PapirVaultAuth) {
                window.PapirVaultAuth.initEmailPasswordSignup({
                    formSelector: "#clientSignUpForm",
                    emailSelector: "#signupEmail",
                    passwordSelector: "#signupPassword",
                    errorSelector: "#signupAuthError",
                    successSelector: "#signupAuthSuccess",
                    redirectTo: "ClientLogin.html"
                });
            }
        });
    </script>
</body>
</html>
